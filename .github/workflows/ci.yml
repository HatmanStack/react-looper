name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

jobs:
  check:
    name: Lint, Type Check & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test -- --ci --forceExit

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [check]
    if: always()
    steps:
      - name: Verify
        run: |
          results=("${{ needs.check.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more checks failed: $result"
              exit 1
            fi
          done
          echo "All checks passed!"
